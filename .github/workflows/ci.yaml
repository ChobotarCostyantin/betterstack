name: Run CI

on:
  push:
    branches-ignore:
      - "feat/labs"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint
