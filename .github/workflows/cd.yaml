name: Build and Push Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: production
          push: true
          tags: |
            staleread/betterstack-be:latest
            staleread/betterstack-be:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: production
          push: true
          tags: |
            staleread/betterstack-fe:latest
            staleread/betterstack-fe:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_BASE_URL=${{ vars.BACKEND_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy Backend
        run: |
          doctl apps create-deployment "${{ secrets.DO_BACKEND_APP_ID }}" --force-rebuild

      - name: Deploy Frontend
        run: |
          doctl apps create-deployment "${{ secrets.DO_FRONTEND_APP_ID }}" --force-rebuild
